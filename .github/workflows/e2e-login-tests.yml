name: E2E Login Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AutPruebLogin
        uses: actions/checkout@v3
      
      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: uv sync
      
      # Clone and start backend
      - name: Checkout backend
        uses: actions/checkout@v3
        with:
          repository: Tar-Mairon24/DS-backend
          path: ../backend
      
      - name: Start backend services and setup database
        run: |
          cd ../backend
          make create-backend
          echo "Backend and database ready"
          sleep 5
      
      # Clone and start frontend
      - name: Checkout frontend
        uses: actions/checkout@v3
        with:
          repository: Tar-Mairon24/DS-Frontend
          path: ../frontend
      
      - name: Start frontend services
        run: |
          cd ../frontend
          docker-compose up -d
          echo "Waiting for frontend to be ready..."
          sleep 15
      
      - name: Create users test file
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER2_EMAIL: ${{ secrets.TEST_USER2_EMAIL }}
          TEST_USER2_PASSWORD: ${{ secrets.TEST_USER2_PASSWORD }}
          TEST_USER3_EMAIL: ${{ secrets.TEST_USER3_EMAIL }}
          TEST_USER3_PASSWORD: ${{ secrets.TEST_USER3_PASSWORD }}
        run: |
          cat > usuarios.txt << EOF
          $TEST_USER_EMAIL,$TEST_USER_PASSWORD
          $TEST_USER2_EMAIL,$TEST_USER2_PASSWORD
          $TEST_USER3_EMAIL,$TEST_USER3_PASSWORD
          EOF
      
      - name: Run E2E Login Tests
        run: uv run python Login.py usuarios.txt
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            reporte_pruebas.log
            evidencias_login/
          retention-days: 30
      
      # Show test results summary
      - name: Display test summary
        if: always()
        run: |
          echo "=== TEST RESULTS ==="
          cat reporte_pruebas.log || echo "No log file found"
      
      # Cleanup
      - name: Stop containers
        if: always()
        run: |
          docker-compose -f ../backend/docker-compose.yml down || true
          docker-compose -f ../frontend/docker-compose.yml down || true
