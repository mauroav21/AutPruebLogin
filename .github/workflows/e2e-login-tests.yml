name: E2E Login Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AutPruebLogin
        uses: actions/checkout@v4
      
      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: uv sync
      
      # Clone and start backend
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: Tar-Mairon24/DS-backend
          path: backend
      
      - name: Create backend .env file
        env:
          DB_USER: ${{ secrets.BACKEND_DB_USER }}
          DB_PASSWORD: ${{ secrets.BACKEND_DB_PASSWORD }}
          DB_HOST: localhost
          DB_PORT: 3307
          DB_NAME: ${{ secrets.BACKEND_DB_NAME }}
          DB_SSLMODE: disable
          SERVER_PORT: 8080
          SERVER_TIMEZONE: America/Monterrey
          JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          JWT_EXPIRATION_MINUTES: 15
          SMTP_USER: ${{ secrets.BACKEND_SMTP_USER }}
          SMTP_PASS: ${{ secrets.BACKEND_SMTP_PASS }}
          USER1_EMAIL: ${{ secrets.BACKEND_USER1_EMAIL }}
          USER1_NAME: Admin
          USER1_PASSWORD: ${{ secrets.BACKEND_USER1_PASSWORD }}
          USER2_EMAIL: ${{ secrets.BACKEND_USER2_EMAIL }}
          USER2_NAME: Agente
          USER2_PASSWORD: ${{ secrets.BACKEND_USER2_PASSWORD }}
        run: |
          cat > backend/.env << EOF
          # Database Configuration
          DB_USER=$DB_USER
          DB_PASSWORD=$DB_PASSWORD
          DB_NAME=$DB_NAME
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_SSLMODE=$DB_SSLMODE
          # Server Configuration
          SERVER_PORT=$SERVER_PORT
          SERVER_TIMEZONE=$SERVER_TIMEZONE
          # JWT Configuration
          JWT_SECRET=$JWT_SECRET
          JWT_EXPIRATION_MINUTES=$JWT_EXPIRATION_MINUTES
          # Email Configuration
          SMTP_USER=$SMTP_USER
          SMTP_PASS=$SMTP_PASS
          # User Seeding
          USER1_EMAIL=$USER1_EMAIL
          USER1_NAME=$USER1_NAME
          USER1_PASSWORD=$USER1_PASSWORD
          USER2_EMAIL=$USER2_EMAIL
          USER2_NAME=$USER2_NAME
          USER2_PASSWORD=$USER2_PASSWORD
          EOF
      
      - name: Create Docker network
        run: docker network create ds_network || true
      
      - name: Install migrate tool
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/
      
      - name: Start backend services and setup database
        run: |
          cd backend
          make create-backend
          echo "Backend and database ready"
          sleep 5
      
      # Clone and start frontend
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: Tar-Mairon24/DS-Frontend
          path: frontend
      
      - name: Start frontend services
        run: |
          cd frontend
          docker compose up -d
          echo "Waiting for frontend to be ready..."
          sleep 15
      
      - name: Create users test file
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER2_EMAIL: ${{ secrets.TEST_USER2_EMAIL }}
          TEST_USER2_PASSWORD: ${{ secrets.TEST_USER2_PASSWORD }}
          TEST_USER3_EMAIL: ${{ secrets.TEST_USER3_EMAIL }}
          TEST_USER3_PASSWORD: ${{ secrets.TEST_USER3_PASSWORD }}
        run: |
          cat > usuarios.txt << EOF
          $TEST_USER_EMAIL,$TEST_USER_PASSWORD
          $TEST_USER2_EMAIL,$TEST_USER2_PASSWORD
          $TEST_USER3_EMAIL,$TEST_USER3_PASSWORD
          EOF
      
      - name: Run E2E Login Tests
        run: uv run python Login.py usuarios.txt
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            reporte_pruebas.log
            evidencias_login/
          retention-days: 30
      
      # Show test results summary
      - name: Display test summary
        if: always()
        run: |
          echo "=== TEST RESULTS ==="
          cat reporte_pruebas.log || echo "No log file found"
      
      # Cleanup
      - name: Stop containers
        if: always()
        run: |
          docker compose -f backend/compose.yml down || true
          docker compose -f frontend/compose.yml down || true
